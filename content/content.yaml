# Agent Adoption Advisor — content + rules (source of truth).
#
# Authored in YAML for SME ergonomics; compiled to public/content.json at build
# and validated against schema/content.schema.json in CI. Do NOT hand-edit the
# compiled JSON.
#
# Rule of thumb for SMEs:
#   - ALWAYS quote string values (avoids YAML coercing NO/ON/version-like text).
#   - weights nudge; disqualifiers hard-block; requiredPrereqs gate; strongFits flag.
#   - The tool must be willing to recommend AWAY from a heavy custom build when a
#     packaged skill covers the scenario. That honesty is the whole product.
#
# Point scale convention: 0 (no signal) .. 5 (defining signal) per option.

version: "2026.07"
lastReviewed: "2026-07-08"

questions:
  - id: "job"
    prompt: "What is the primary job to be done?"
    options:
      - id: "automate_task"
        label: "Automate a common, well-scoped task"
      - id: "research"
        label: "Research, retrieve, and synthesize information"
      - id: "workflow"
        label: "A bespoke multi-step conversational workflow"
      - id: "platform"
        label: "A platform other teams build agents on"

  - id: "builder"
    prompt: "Who will build and own it?"
    options:
      - id: "business"
        label: "Business users, no code"
      - id: "maker"
        label: "Makers / low-code (Power Platform skillset)"
      - id: "engineer"
        label: "Professional engineers who own code in production"

  - id: "grounding"
    prompt: "Where does the agent's knowledge come from?"
    options:
      - id: "m365"
        label: "Just my Microsoft 365 content (files, mail, chats)"
      - id: "saas_connectors"
        label: "Line-of-business SaaS via connectors"
      - id: "custom_data"
        label: "Custom / proprietary data stores or indexes"

  - id: "integration"
    prompt: "How deep is the systems integration?"
    options:
      - id: "surface_only"
        label: "None — lives inside the Copilot surface"
      - id: "connectors"
        label: "Prebuilt connectors to known SaaS"
      - id: "custom_api"
        label: "Deep custom API / backend integration"

  - id: "sensitivity"
    prompt: "What is the data sensitivity and compliance posture?"
    options:
      - id: "standard"
        label: "Standard corporate data"
      - id: "regulated"
        label: "Regulated: residency / sovereignty required"
      - id: "restricted"
        label: "Highly restricted / custom compliance boundary"

  - id: "governance"
    prompt: "What governance and lifecycle needs apply?"
    options:
      - id: "self_serve"
        label: "Self-serve, minimal governance"
      - id: "central_alm"
        label: "Central ALM: environments, DLP, managed rollout"
      - id: "mlops"
        label: "Full engineering MLOps / CI-CD"

  - id: "extensibility"
    prompt: "How much custom logic and extensibility is needed?"
    options:
      - id: "none"
        label: "None — out-of-the-box behavior is enough"
      - id: "some"
        label: "Some custom actions, flows, or prompts"
      - id: "full"
        label: "Full custom code, models, or orchestration"

  - id: "reach"
    prompt: "Who is the audience?"
    options:
      - id: "individual"
        label: "Just me or my team"
      - id: "org"
        label: "The whole organization"
      - id: "external"
        label: "External customers / partners"

  - id: "autonomy"
    prompt: "How autonomous should the agent be?"
    options:
      - id: "assistive"
        label: "Assistive, human in the loop"
      - id: "semi"
        label: "Semi-autonomous with checkpoints"
      - id: "autonomous"
        label: "Fully autonomous background agent"

  - id: "appetite"
    prompt: "What is the build appetite versus time-to-value?"
    options:
      - id: "configure"
        label: "Need value now, prefer to configure"
      - id: "invest"
        label: "Willing to invest to build and own"

approaches:
  - id: "agent_builder"
    name: "Agent Builder"
    summary: "Fastest path for well-scoped tasks inside Microsoft 365."
    pros:
      - "Lowest time-to-value; no code."
      - "Native to the Microsoft 365 surface users already have."
    cons:
      - "Limited for bespoke, deeply custom workflows."
    whenNotToUse: "When the scenario needs bespoke workflows, deep integration, or central governance."

  - id: "cowork_skills"
    name: "Cowork"
    summary: "Packaged skills for common collaborative tasks with minimal build."
    pros:
      - "Covers common tasks out of the box."
      - "Very low maintenance burden."
    cons:
      - "Not a fit when the workflow is genuinely org-specific."
    whenNotToUse: "When no packaged skill covers the scenario."

  - id: "scout_skills"
    name: "Scout"
    summary: "Skill-augmented approach for research and retrieval tasks."
    pros:
      - "Strong for retrieval-heavy, research-style tasks."
      - "Low build overhead."
    cons:
      - "Narrower than a full custom platform."
    whenNotToUse: "When you need a general-purpose custom agent."

  - id: "copilot_studio"
    name: "Copilot Studio"
    summary: "Low-code authoring for bespoke, governed, pro-code-extensible org workflows."
    pros:
      - "Handles bespoke workflows without full pro-code."
      - "Governed, extensible authoring with connectors, ALM, and pro-dev extensions."
    cons:
      - "More setup than a packaged skill."
    whenNotToUse: "When a packaged skill already covers the task."

rules:
  confidence:
    highMargin: 0.30
    mediumMargin: 0.12
    minFit: 0.40

  # Each matched strong-fit adds this many points. Set high enough that the
  # purpose-built tool for a job wins even when the lighter SKUs tie on generic
  # profile answers. This is the lever that makes "job to be done" dominate.
  strongFitBonus: 10

  # Hard blocks. Regulated/restricted data posture rules out the lighter
  # M365-surface SKUs that cannot guarantee residency or a custom compliance
  # boundary. This is what stops soft answers from crowning an indefensible
  # winner.
  disqualifiers:
    - { question: "sensitivity", option: "regulated", approach: "cowork_skills", reason: "Cowork skills cannot guarantee regional data residency." }
    - { question: "sensitivity", option: "regulated", approach: "scout_skills", reason: "Scout skills cannot guarantee regional data residency." }
    - { question: "sensitivity", option: "regulated", approach: "agent_builder", reason: "Agent Builder cannot guarantee regional data residency." }
    - { question: "sensitivity", option: "restricted", approach: "cowork_skills", reason: "Cowork skills cannot meet a highly restricted compliance boundary." }
    - { question: "sensitivity", option: "restricted", approach: "scout_skills", reason: "Scout skills cannot meet a highly restricted compliance boundary." }
    - { question: "sensitivity", option: "restricted", approach: "agent_builder", reason: "Agent Builder cannot meet a highly restricted compliance boundary." }

  # No approach currently requires a hard prerequisite. (Foundry's engineer
  # prereq was removed when Foundry was dropped from the portfolio.)
  requiredPrereqs: []

  strongFits:
    - { question: "job", option: "automate_task", approach: "cowork_skills", reason: "A packaged skill likely covers this task directly." }
    - { question: "job", option: "research", approach: "scout_skills", reason: "Scout is purpose-built for research and retrieval." }
    - { question: "job", option: "workflow", approach: "copilot_studio", reason: "Copilot Studio is built for bespoke conversational workflows." }
    - { question: "job", option: "platform", approach: "copilot_studio", reason: "Copilot Studio is the most extensible, pro-code-capable option for platform-style builds." }

  weights:
    # Q1 job
    - { question: "job", option: "automate_task", approach: "cowork_skills", points: 5 }
    - { question: "job", option: "automate_task", approach: "agent_builder", points: 4 }
    - { question: "job", option: "automate_task", approach: "scout_skills", points: 2 }
    - { question: "job", option: "automate_task", approach: "copilot_studio", points: 2 }
    - { question: "job", option: "research", approach: "scout_skills", points: 5 }
    - { question: "job", option: "research", approach: "cowork_skills", points: 2 }
    - { question: "job", option: "research", approach: "agent_builder", points: 2 }
    - { question: "job", option: "research", approach: "copilot_studio", points: 1 }
    - { question: "job", option: "workflow", approach: "copilot_studio", points: 5 }
    - { question: "job", option: "workflow", approach: "agent_builder", points: 1 }
    - { question: "job", option: "platform", approach: "copilot_studio", points: 5 }

    # Q2 builder
    - { question: "builder", option: "business", approach: "agent_builder", points: 4 }
    - { question: "builder", option: "business", approach: "cowork_skills", points: 4 }
    - { question: "builder", option: "business", approach: "scout_skills", points: 3 }
    - { question: "builder", option: "business", approach: "copilot_studio", points: 1 }
    - { question: "builder", option: "maker", approach: "copilot_studio", points: 5 }
    - { question: "builder", option: "maker", approach: "agent_builder", points: 2 }
    - { question: "builder", option: "maker", approach: "cowork_skills", points: 1 }
    - { question: "builder", option: "engineer", approach: "copilot_studio", points: 5 }

    # Q3 grounding
    - { question: "grounding", option: "m365", approach: "agent_builder", points: 4 }
    - { question: "grounding", option: "m365", approach: "cowork_skills", points: 3 }
    - { question: "grounding", option: "m365", approach: "scout_skills", points: 3 }
    - { question: "grounding", option: "m365", approach: "copilot_studio", points: 1 }
    - { question: "grounding", option: "saas_connectors", approach: "copilot_studio", points: 5 }
    - { question: "grounding", option: "custom_data", approach: "copilot_studio", points: 5 }

    # Q4 integration
    - { question: "integration", option: "surface_only", approach: "agent_builder", points: 4 }
    - { question: "integration", option: "surface_only", approach: "cowork_skills", points: 4 }
    - { question: "integration", option: "surface_only", approach: "scout_skills", points: 3 }
    - { question: "integration", option: "connectors", approach: "copilot_studio", points: 5 }
    - { question: "integration", option: "custom_api", approach: "copilot_studio", points: 5 }

    # Q5 sensitivity (standard = neutral; regulated/restricted mostly gate via disqualifiers)
    - { question: "sensitivity", option: "regulated", approach: "copilot_studio", points: 3 }
    - { question: "sensitivity", option: "restricted", approach: "copilot_studio", points: 4 }

    # Q6 governance
    - { question: "governance", option: "self_serve", approach: "agent_builder", points: 3 }
    - { question: "governance", option: "self_serve", approach: "cowork_skills", points: 3 }
    - { question: "governance", option: "self_serve", approach: "scout_skills", points: 3 }
    - { question: "governance", option: "central_alm", approach: "copilot_studio", points: 5 }
    - { question: "governance", option: "mlops", approach: "copilot_studio", points: 5 }

    # Q7 extensibility
    - { question: "extensibility", option: "none", approach: "cowork_skills", points: 4 }
    - { question: "extensibility", option: "none", approach: "agent_builder", points: 3 }
    - { question: "extensibility", option: "none", approach: "scout_skills", points: 2 }
    - { question: "extensibility", option: "some", approach: "copilot_studio", points: 5 }
    - { question: "extensibility", option: "some", approach: "agent_builder", points: 1 }
    - { question: "extensibility", option: "full", approach: "copilot_studio", points: 5 }

    # Q8 reach
    - { question: "reach", option: "individual", approach: "agent_builder", points: 3 }
    - { question: "reach", option: "individual", approach: "cowork_skills", points: 3 }
    - { question: "reach", option: "individual", approach: "scout_skills", points: 3 }
    - { question: "reach", option: "org", approach: "copilot_studio", points: 4 }
    - { question: "reach", option: "org", approach: "agent_builder", points: 1 }
    - { question: "reach", option: "external", approach: "copilot_studio", points: 4 }

    # Q9 autonomy
    - { question: "autonomy", option: "assistive", approach: "agent_builder", points: 3 }
    - { question: "autonomy", option: "assistive", approach: "cowork_skills", points: 3 }
    - { question: "autonomy", option: "assistive", approach: "scout_skills", points: 2 }
    - { question: "autonomy", option: "assistive", approach: "copilot_studio", points: 1 }
    - { question: "autonomy", option: "semi", approach: "copilot_studio", points: 4 }
    - { question: "autonomy", option: "autonomous", approach: "copilot_studio", points: 5 }

    # Q10 appetite (tie-breaker)
    - { question: "appetite", option: "configure", approach: "cowork_skills", points: 3 }
    - { question: "appetite", option: "configure", approach: "agent_builder", points: 2 }
    - { question: "appetite", option: "configure", approach: "scout_skills", points: 2 }
    - { question: "appetite", option: "configure", approach: "copilot_studio", points: 1 }
    - { question: "appetite", option: "invest", approach: "copilot_studio", points: 3 }
